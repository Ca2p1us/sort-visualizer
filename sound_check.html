<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>音声パラメータ体験</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div style="text-align: left; padding: 10px 20px;">
        <a href="index.html">⬅ ソート可視化ページへ戻る</a>
    </div>

    <h2>音声パラメータの変化を体験</h2>
    
    <div class="control-panel">
        <div class="slider-group">
            <label for="volumeSlider">音量 (Volume): <span id="volumeValue">1.0</span>倍</label>
            <input type="range" id="volumeSlider" min="0.0" max="3.0" step="0.1" value="1.0">
        </div>
        
        <div class="slider-group">
            <label for="pitchSlider">ピッチ (Pitch & Speed): <span id="pitchValue">1.0</span>倍</label>
            <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.05" value="1.0">
            <small style="color:#a1bed0; display:block; margin-top:5px;">※1.0が標準。下げると低く遅く、上げると高く速くなります。</small>
        </div>
        
        <button id="processBtn" style="width: 100%;">音声を処理して再生</button><br>
        
        <audio id="audioPlayer" controls></audio>
    </div>

    <script type="module">
        // 生成されたpkgフォルダから、Rustの関数をインポート
        import init, { process_audio } from './pkg/audio_backend.js';

        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const pitchSlider = document.getElementById('pitchSlider');
        const pitchValue = document.getElementById('pitchValue');
        const processBtn = document.getElementById('processBtn');
        const audioPlayer = document.getElementById('audioPlayer');

        volumeSlider.addEventListener('input', (e) => volumeValue.textContent = e.target.value);
        pitchSlider.addEventListener('input', (e) => pitchValue.textContent = e.target.value);

        // ★ Wasmエンジンの起動を待つ
        let wasmReady = false;
        init().then(() => {
            wasmReady = true;
            console.log("WebAssembly Ready!");
        });

        processBtn.addEventListener('click', async () => {
            if (!wasmReady) {
                alert("システムの準備中です。少々お待ちください。");
                return;
            }

            processBtn.disabled = true;
            processBtn.textContent = "処理中...";

            const volume = parseFloat(volumeSlider.value);
            const pitch = parseFloat(pitchSlider.value);

            try {
                // 1. input.wav ファイルを読み込み、純粋な「バイト配列(Uint8Array)」に変換する
                const response = await fetch('./input.wav');
                if (!response.ok) throw new Error("input.wavが見つかりません");
                const arrayBuffer = await response.arrayBuffer();
                const inputBytes = new Uint8Array(arrayBuffer);

                // 2. ★Rust (WebAssembly) に渡して爆速計算！通信ゼロ！
                const outputBytes = process_audio(inputBytes, volume, pitch);

                // 3. 返ってきたバイト配列をBlob（音声ファイル）にして再生
                const blob = new Blob([outputBytes], { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(blob);
                
                audioPlayer.src = audioUrl;
                audioPlayer.play();

            } catch (error) {
                alert("エラー: \n" + error.message);
            } finally {
                processBtn.disabled = false;
                processBtn.textContent = "音声を処理して再生";
            }
        });
    </script>
</body>
</html>
</body>
</html>
